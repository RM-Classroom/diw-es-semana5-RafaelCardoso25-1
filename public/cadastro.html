<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Pagina de Cadastro</title>
</head>
<body>
    <header class="titulo">
        <div class="content">
            <div class="left-content">
                <h1><a href="principal.html">BetaHub</a></h1>
            <div class="pesquisar">
                <input type="text" class="barra" placeholder="Buscar Jogos...">
                <button class="botao" type="submit">Pesquisar</button>
            </div>
        </div>
            <nav class="nav">
                <a href="#" class="navegacao">Estilo de Jogo ▾</a>
                <a href="premium.html" class="premium">Torne-se Premium</a>
                <a href="login.html" class="login">Conecte-se</a>
            </nav>
        </div>
    </header>
    <main class="main">
        <form class="container">
            <div>
                <h1>Cadastre-se</h1>
            </div>
            <div class="Nome">
                <input type="text" placeholder="Nome:">
                <input type="text" placeholder="Sobrenome:">
            </div>
            <div class="Cadastro">
                <input type="email" placeholder="Usuario:">
                <i class="bx bxs-user"></i>
            </div>
            <div class="Cadastro">
                <input type="password" placeholder="Senha:">
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="Cadastro">
                <input type="text" placeholder="Telefone:">
            </div>
            <button class="Botao" type="submit">
                Fazer Cadastro
            </button>
        </form>
    </main>
</body>
</html>
